# Vale Configuration for GrayArea Fiction Project
# https://vale.sh/docs/topics/config/

StylesPath = .vale/styles
Vocab = GrayArea

MinAlertLevel = suggestion

# Glob patterns to lint
[*.{md,txt}]

# Disable linting for archive and generated files
[archive/**]
BasedOnStyles =

[lore/Codex/CONSOLIDATION_MAP.md]
BasedOnStyles =

[lore/Codex/ISSUES.md]
BasedOnStyles =

# Main linting rules for manuscripts and lore
[book1/chapters/*.md]
BasedOnStyles = Vale

# Basic prose quality rules
Vale.Spelling = YES
Vale.Repetition = YES
Vale.Terms = NO

# write-good rules (passive voice, weasel words, etc.)
write-good.Passive = suggestion
write-good.Weasel = suggestion
write-good.Illusions = suggestion
write-good.So = suggestion
write-good.ThereIs = suggestion
write-good.TooWordy = suggestion
write-good.Cliches = warning
write-good.E-Prime = NO

# Custom vocabulary exceptions for sci-fi terms
# These will be added to .vale/styles/Vocab/accept.txt

[lore/**/*.md]
BasedOnStyles = Vale

Vale.Spelling = YES
Vale.Repetition = YES

# Documentation linting
[docs/*.md]
BasedOnStyles = Vale

Vale.Spelling = YES
